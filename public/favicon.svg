<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Violet rounded background -->
  <rect width="32" height="32" rx="7" fill="#8b5cf6"/>

  <!-- Left ear -->
  <ellipse cx="8.5" cy="12" rx="3" ry="3.5" fill="white"/>
  <ellipse cx="8.5" cy="12" rx="1.8" ry="2.2" fill="#ede9fe"/>

  <!-- Right ear -->
  <ellipse cx="25.5" cy="12" rx="3" ry="3.5" fill="white"/>
  <ellipse cx="25.5" cy="12" rx="1.8" ry="2.2" fill="#ede9fe"/>

  <!-- Body -->
  <ellipse cx="17" cy="19" rx="10" ry="9" fill="white"/>

  <!-- Coin slot -->
  <rect x="13.5" y="10" width="7" height="1.8" rx="0.9" fill="#7c3aed"/>

  <!-- Eyes -->
  <circle cx="13.5" cy="17.5" r="1.5" fill="#7c3aed"/>
  <circle cx="20.5" cy="17.5" r="1.5" fill="#7c3aed"/>

  <!-- Snout -->
  <ellipse cx="17" cy="22.5" rx="4.5" ry="3" fill="#ede9fe"/>

  <!-- Nostrils -->
  <circle cx="15.3" cy="22.5" r="1" fill="#8b5cf6"/>
  <circle cx="18.7" cy="22.5" r="1" fill="#8b5cf6"/>
</svg>
